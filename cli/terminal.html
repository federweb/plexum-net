<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PulseTerminal</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; background: #1a1b26; overflow: hidden; }
        #terminal { height: 100%; width: 100%; }

        #status {
            position: fixed; top: 20px; right: 20px;
            padding: 4px 12px; border-radius: 12px;
            font: 12px/1.4 monospace; color: #c0caf5; z-index: 10;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);
            transition: all 0.3s;
        }
        .st-ok   { border: 1px solid #9ece6a; }
        .st-off  { border: 1px solid #f7768e; }
        .st-wait { border: 1px solid #e0af68; }

        #session-badge {
            position: fixed; bottom: 45px; right: 20px;
            padding: 4px 12px; border-radius: 12px;
            font: 12px/1.4 monospace; color: #c0caf5; z-index: 10;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);
            border: 1px solid #414868;
            text-decoration: none;
            transition: border-color 0.2s;
        }
        #session-badge:hover { border-color: #00ff88; color: #00ff88; }

        #toast {
            position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.75); color: #9ece6a;
            font: 12px/1 monospace; padding: 6px 16px; border-radius: 10px;
            border: 1px solid #9ece6a; pointer-events: none;
            opacity: 0; transition: opacity 0.2s; z-index: 20;
        }
        #toast.show { opacity: 1; }

        #mouse-btn {
            position: fixed; top: 20px; right: 120px;
            padding: 4px 12px; border-radius: 12px;
            font: 12px/1.4 monospace; color: #c0caf5; z-index: 10;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);
            border: 1px solid #414868; cursor: pointer;
            transition: border-color 0.2s, color 0.2s, background 0.2s;
        }
        #mouse-btn:hover { border-color: #bb9af7; color: #bb9af7; }
        #mouse-btn.off {
            border-color: #f7768e; color: #f7768e;
            background: rgba(247,118,142,0.10);
        }

        body { overscroll-behavior: none; touch-action: none; }
    </style>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#1a1b26">
</head>
<body>

<a id="session-badge" href=".">← sessions</a>
<div id="status" class="st-wait">connecting...</div>
<button id="mouse-btn" title="Toggle tmux mouse mode">mouse: on</button>
<div id="terminal"></div>
<div id="toast"></div>

<script src="/nodepulse-sw.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm-addon-webgl@0.16.0/lib/xterm-addon-webgl.js"></script>
<script>
(function() {
    'use strict';

    const term = new Terminal({
        cursorBlink: true,
        fontSize: 14,
        fontFamily: '"Fira Code", Menlo, Monaco, "Courier New", monospace',
        scrollback: 10000,
        theme: {
            background:    '#1a1b26',
            foreground:    '#a9b1d6',
            cursor:        '#c0caf5',
            selectionBackground: 'rgba(122,162,247,0.3)',
            black:   '#15161e', brightBlack:   '#414868',
            red:     '#f7768e', brightRed:     '#f7768e',
            green:   '#9ece6a', brightGreen:   '#9ece6a',
            yellow:  '#e0af68', brightYellow:  '#e0af68',
            blue:    '#7aa2f7', brightBlue:    '#7aa2f7',
            magenta: '#bb9af7', brightMagenta: '#bb9af7',
            cyan:    '#7dcfff', brightCyan:    '#7dcfff',
            white:   '#a9b1d6', brightWhite:   '#c0caf5',
        }
    });

    const fitAddon = new FitAddon.FitAddon();
    term.loadAddon(fitAddon);

    try {
        term.loadAddon(new WebglAddon.WebglAddon());
    } catch(e) {
        console.log('WebGL unavailable, using canvas renderer');
    }

    term.open(document.getElementById('terminal'));
    fitAddon.fit();

    const statusEl  = document.getElementById('status');
    const toastEl   = document.getElementById('toast');
    let toastTimer  = null;

    function setStatus(text, cls) {
        statusEl.textContent = text;
        statusEl.className = cls;
    }

    function showToast(msg) {
        toastEl.textContent = msg;
        toastEl.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(function() { toastEl.classList.remove('show'); }, 1400);
    }

    // --- Session ID from URL params ---
    var params = new URLSearchParams(location.search);
    var sid    = params.get('sid');

    // Build WebSocket URL: ws/p/{sid} resolves relative to /cli/terminal
    // e.g. https://host/cli/terminal?sid=abc → wss://host/cli/ws/p/abc
    var wsUrl  = new URL('ws/p/' + sid, location.href).href.replace(/^http/, 'ws');

    // Update session badge
    var badge = document.getElementById('session-badge');
    if (sid) badge.textContent = '← ' + sid;

    // --- WebSocket ---
    var ws = null;
    var reconnectTimer = null;
    var reconnectDelay = 1000;

    function connect() {
        ws = new WebSocket(wsUrl);
        ws.binaryType = 'arraybuffer';

        ws.onopen = function() {
            setStatus('connected', 'st-ok');
            reconnectDelay = 1000;
            ws.send(JSON.stringify({ type: 'resize', cols: term.cols, rows: term.rows }));
            sendMouseState();
            term.focus();
        };

        ws.onmessage = function(e) {
            if (e.data instanceof ArrayBuffer) {
                term.write(new Uint8Array(e.data));
            } else {
                term.write(e.data);
            }
        };

        ws.onclose = function() {
            setStatus('disconnected - reconnecting...', 'st-off');
            scheduleReconnect();
        };

        ws.onerror = function() {
            setStatus('connection error', 'st-off');
        };
    }

    function scheduleReconnect() {
        if (reconnectTimer) return;
        reconnectTimer = setTimeout(function() {
            reconnectTimer = null;
            setStatus('reconnecting...', 'st-wait');
            connect();
            reconnectDelay = Math.min(reconnectDelay * 1.5, 10000);
        }, reconnectDelay);
    }

    term.onData(function(data) {
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(data);
        }
    });

    // --- Mouse toggle ---
    // tmux mouse mode is global per tmux server. We persist the user's choice
    // in localStorage and re-apply it on every (re)connect.
    var mouseBtn = document.getElementById('mouse-btn');
    var mouseEnabled = localStorage.getItem('pt_mouse') !== 'off';

    function renderMouseBtn() {
        mouseBtn.textContent = 'mouse: ' + (mouseEnabled ? 'on' : 'off');
        mouseBtn.classList.toggle('off', !mouseEnabled);
    }

    function sendMouseState() {
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ type: 'set_mouse', enabled: mouseEnabled }));
        }
    }

    mouseBtn.addEventListener('click', function() {
        mouseEnabled = !mouseEnabled;
        localStorage.setItem('pt_mouse', mouseEnabled ? 'on' : 'off');
        renderMouseBtn();
        sendMouseState();
        showToast('mouse ' + (mouseEnabled ? 'on' : 'off'));
        term.focus();
    });

    renderMouseBtn();

    function doResize() { fitAddon.fit(); }

    term.onResize(function(size) {
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ type: 'resize', cols: size.cols, rows: size.rows }));
        }
    });

    window.addEventListener('resize', doResize);

    let resizeTimeout;
    window.addEventListener('orientationchange', function() {
        clearTimeout(resizeTimeout);
        resizeTimeout = setTimeout(doResize, 200);
    });

    connect();

})();
</script>
</body>
</html>
